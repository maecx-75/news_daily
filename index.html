<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(90deg, #c40012, #700008);
  padding: 15px 30px;
}

.logo img {
  height: 60px;
}

.title {
  text-align: center;
  flex: 1;
}

.title h1 {
  margin: 0;
  font-size: 36px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 15px;
  padding: 20px;
}

.tile {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  background-size: cover;
  background-position: center;
}

.tile.large {
  grid-column: span 4;
  height: 280px;
}

.tile.small {
  grid-column: span 6;
  height: 200px;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

h2 {
  margin: 0;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
  </div>
  <div class="title">
    <h1>Das Wichtigste des Tages</h1>
  </div>
</div>

<div class="grid">

<a class="tile large" href="https://www.servustv.com/aktuelles/b/servus-nachrichten-in-90-sekunden/aaygf2urw6alqye42ijk/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1504711434969-e33886168f5c')">
<div class="overlay"><h2>90 Sekunden News</h2></div>
</a>

<a class="tile large" href="https://www.servustv.com/aktuelles/v/aais9qs7iazmln7iuahw/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1495020689067-958852a7765e')">
<div class="overlay"><h2>Nachrichten 19:20</h2></div>
</a>

<a class="tile large" href="https://www.servustv.com/aktuelles/b/servus-wetter/aa-1tb7r1phs1w11/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1504608524841-42fe6f032b4b')">
<div class="overlay"><h2>Wetter</h2></div>
</a>

<a class="tile small" href="https://www.servustv.com/tv-programm/pn0b1ec15b2fe10/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
<div class="overlay"><h2>TV Programm</h2></div>
</a>

<a class="tile small" href="https://news.google.com/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRFZxYUdjU0FtUmxHZ0pCVkNnQVAB?hl=de&gl=AT&ceid=AT%3Ade" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">
<div class="overlay"><h2>Top News</h2></div>
</a>

</div>

</body>
</html>
