<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{background:#000;color:#fff;font-family:Arial}
.tile{width:300px;height:200px;background-size:cover;position:relative;border-radius:10px;overflow:hidden}
.overlay{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);padding:10px}
.play{position:absolute;top:10px;left:10px;background:red;color:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:24px}
</style>
</head>
<body>

<a class="tile" href="#" onclick="openVideo(event)" style="background-image:url('thumbnail.jpg')">
<div class="play">▶</div>
<div class="overlay">Video des Tages<br>Nagelschneiden bei Murmeltieren</div>
</a>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center">
<video controls autoplay style="max-width:90%">
<source src="video.mp4" type="video/mp4">
</video>
</div>

<script>
function openVideo(e){
e.preventDefault();
document.getElementById('modal').style.display='flex';
}
</script>

</body>
</html>
