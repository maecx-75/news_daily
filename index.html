<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:white;}
.header{background:#c40012;padding:20px;text-align:center;}

/* Breaking Banner */
.banner{
display:flex;
background:#111;
overflow:hidden;
border-bottom:2px solid #c40012;
}
.banner-label{
background:#c40012;
padding:10px 15px;
font-weight:bold;
}
.banner-track{
white-space:nowrap;
animation:scroll 20s linear infinite;
padding:10px;
}
@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:15px;padding:20px;}

.tile{position:relative;border-radius:10px;overflow:hidden;text-decoration:none;color:white;
background-size:cover;background-position:center;min-height:280px;display:block;}

.tile.large{grid-column:span 4;}
.tile.small{grid-column:span 6;min-height:200px;}

.overlay{position:absolute;bottom:0;width:100%;padding:15px;
background:linear-gradient(transparent,rgba(0,0,0,0.85));}

.headlines{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:8px;
font-size:13px;
max-width:60%;
}
.headlines div{margin-bottom:6px;}
</style>
</head>

<body>

<div class="header">
<h1>Das Wichtigste des Tages</h1>
</div>

<div class="banner">
<div class="banner-label">Breaking</div>
<div class="banner-track">
Topmeldung 1 • Topmeldung 2 • Topmeldung 3 • Topmeldung 4 •
</div>
</div>

<div class="grid">

<a class="tile large" href="https://www.servustv.com/aktuelles/v/aaft895vwami4c3daw3k/" target="_blank"
style="background-image:url('news90.png')">
<div class="overlay"><h2>90 Sekunden News</h2></div>
</a>

<a class="tile large" href="https://www.servustv.com/aktuelles/v/aais9qs7iazmln7iuahw/" target="_blank"
style="background-image:url('news1920.png')">
<div class="overlay"><h2>Nachrichten 19:20</h2></div>
</a>

<a class="tile large" href="https://www.servustv.com/aktuelles/b/servus-wetter/aa-1tb7r1phs1w11/" target="_blank"
style="background-image:url('wetter.png')">
<div class="overlay"><h2>Servus Wetter</h2></div>
</a>

<a class="tile small" href="https://www.servustv.com/tv-programm/pn0b1ec15b2fe10/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
<div class="overlay"><h2>TV Programm</h2></div>
</a>

<a class="tile small" href="https://news.google.com/" target="_blank"
style="background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d')">

<div class="headlines">
<div>• Schlagzeile 1</div>
<div>• Schlagzeile 2</div>
<div>• Schlagzeile 3</div>
</div>

<div class="overlay"><h2>Top Nachrichten</h2></div>
</a>

</div>

</body>
</html>
